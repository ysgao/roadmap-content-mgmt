/* ─── SHEETS LOADING ─────────────────────────────────────────────────────── */
async function gviz(tab) {
  const url = `https://docs.google.com/spreadsheets/d/${GOOGLE_SHEETS_ID}/gviz/tq?tqx=out:json&sheet=${encodeURIComponent(tab)}`;
  const res = await fetch(url);
  if (!res.ok) throw new Error(`Sheets HTTP ${res.status} on "${tab}"`);
  const text = await res.text();
  const data = JSON.parse(text.replace(/^[^{]*/,'').replace(/\);\s*$/,''));
  if (data.status !== 'ok' || !data.table) return [];
  const headers = data.table.cols.map(c => (c.label||c.id).trim());
  return data.table.rows.map(row => {
    const cells = row.c ?? [];
    return headers.reduce((o,h,i) => { const c=cells[i]; o[h]=c&&c.v!=null?String(c.v).trim():''; return o; }, {});
  }).filter(r => Object.values(r).some(v=>v!==''));
}
const str = v => v&&v.trim()?v.trim():null;
function parseChips(val, map) {
  if (!val) return [];
  return val.split('|').map(seg => { const [code,ref]=seg.trim().split(':'); const sc=code.trim(); return {shortCode:sc,displayLabel:map.get(sc)??sc,referenceNumber:ref?parseInt(ref,10):undefined}; }).filter(c=>c.shortCode);
}
function parsePeriods(val) {
  if (!val) return [];
  return val.split('|').map(seg => { const p=seg.trim().split(':'); return {periodLabel:p[0].trim(),barStyle:p[1]?.trim()??'Active'}; }).filter(d=>d.periodLabel);
}
async function loadSheets() {
  const evtRows = await gviz('ProvenanceEvents');
  const events = evtRows.map((r,i) => ({id:r.id||String(i+1),shortCode:r.shortCode??'',displayLabel:r.displayLabel??r.shortCode??'',eventType:r.eventType??'Survey',eventDate:r.eventDate??'',participantCount:r.participantCount?parseInt(r.participantCount,10):null})).filter(e=>e.shortCode);
  const map = new Map(events.map(e=>[e.shortCode,e.displayLabel]));
  const [iRows,pRows,jtRows] = await Promise.all([gviz('RoadmapItems'),gviz('MemberPriorities'),gviz('JiraProjects').catch(()=>[])]);
  const jiraTickets = jtRows.map(r => ({ticketId:str(r.ticketId)??'',project:str(r.project)??'',status:str(r.status)??'',jiraTitle:str(r.jiraTitle)??'',associatedRoadmapItems:(r.associatedRoadmapItems??'').split('|').map(x=>x.trim()).filter(Boolean)})).filter(t=>t.ticketId);
  const jiraByItem = new Map();
  jiraTickets.forEach(t=>t.associatedRoadmapItems.forEach(id=>{if(!jiraByItem.has(id))jiraByItem.set(id,[]);jiraByItem.get(id).push(t);}));
  const items = iRows.map((r,i) => ({id:r.id||String(i+1),title:r.title??'',askDescription:r.askDescription??'',siStatus:r.siStatus??'Active',impactRating:str(r.impactRating),horizon:r.horizon??'Now',activityType:r.activityType??'MemberDriven',timelineClassification:r.timelineClassification??'Project',trigger:str(r.trigger),progressNarrative:str(r.progressNarrative),addressedStatus:str(r.addressedStatus),nextMilestoneDate:str(r.nextMilestoneDate),implementationNotes:str(r.implementationNotes),displayOrder:r.displayOrder?parseInt(r.displayOrder,10):i,provenanceChips:parseChips(r.provenanceChips??'',map),deliveryPeriods:parsePeriods(r.deliveryPeriods??''),jiraTickets:jiraByItem.get(r.id||String(i+1))??[]})).filter(i=>i.title);
  const priorities = pRows.map((r,i) => ({id:r.id||String(i+1),rank:r.rank?parseInt(r.rank,10):i+1,topicTitle:r.topicTitle??'',responseCount:r.responseCount?parseInt(r.responseCount,10):0,responsePercentage:r.responsePercentage?parseFloat(r.responsePercentage):0,currentSIActivity:str(r.currentSIActivity),progressSummary:str(r.progressSummary),nextMilestones:str(r.nextMilestones),riskFactors:str(r.riskFactors),provenanceEvents:(r.provenanceEvents??'').split('|').map(x=>x.trim()).filter(Boolean).map(code=>({shortCode:code,displayLabel:map.get(code)??code}))})).filter(p=>p.topicTitle).sort((a,b)=>a.rank-b.rank);
  return {events,items,priorities,jiraTickets};
}

/* ─── INIT ───────────────────────────────────────────────────────────────── */
async function init() {
  try {
    if (GOOGLE_SHEETS_ID) {
      try { state.data = await loadSheets(); state.fromSheets = true; }
      catch(e) { console.warn('Sheets failed, using embedded data:',e.message); state.data={events:FB_EVENTS,items:FB_ITEMS,priorities:FB_PRIORITIES,jiraTickets:FB_JIRA_TICKETS}; }
    } else {
      state.data = {events:FB_EVENTS,items:FB_ITEMS,priorities:FB_PRIORITIES,jiraTickets:FB_JIRA_TICKETS};
    }
  } catch(e) { state.error=e.message; }
  state.loading = false;
  render();
}

/* ─── FILTERING ──────────────────────────────────────────────────────────── */
function filtered() {
  if (!state.data) return [];
  const {origin,siStatus,activityType,jiraProject} = state.filters;
  return state.data.items.filter(item => {
    if (origin && !item.provenanceChips.some(c=>c.shortCode===origin)) return false;
    if (siStatus && item.siStatus!==siStatus) return false;
    if (activityType && item.activityType!==activityType) return false;
    if (jiraProject && !item.jiraTickets.some(t=>t.project===jiraProject)) return false;
    return true;
  });
}

}

/* ─── ROADMAP CARD ───────────────────────────────────────────────────────── */

  let detail = '';
  if (exp) {
    const dpHtml = item.deliveryPeriods.length ? `<div style="margin-top:12px"><div style="font-size:.78rem;color:#718096;font-weight:600;text-transform:uppercase;letter-spacing:.04em;margin-bottom:6px">Delivery Periods</div><div style="display:flex;gap:6px;flex-wrap:wrap">${item.deliveryPeriods.map(dp=>{const c=DELIVERY_COLORS[dp.barStyle]??'#718096';return `<span style="display:inline-flex;align-items:center;gap:4px;padding:3px 10px;border-radius:4px;font-size:.78rem;font-weight:600;background:${c}22;border:1px solid ${c}55;color:${c}"><span style="width:8px;height:8px;border-radius:50%;background:${c};display:inline-block"></span>${esc(dp.periodLabel)} (${esc(dp.barStyle)})</span>`;}).join('')}</div></div>` : '';

    detail = `<div style="padding:4px 16px 16px 42px;border-top:1px solid #f0f4f8">${item.askDescription?`<p style="margin:10px 0 12px;font-size:.87rem;color:#4a5568;line-height:1.6">${esc(item.askDescription)}</p>`:''}${fieldRow('Timeline',item.timelineClassification)}${fieldRow('Trigger',item.trigger)}${fieldRow('Progress',item.progressNarrative)}${fieldRow('Addressed',item.addressedStatus)}${fieldRow('Next Milestone',item.nextMilestoneDate)}${fieldRow('Implementation Notes',item.implementationNotes)}${dpHtml}${jiraHtml}</div>`;

function renderHorizon(h) {
  const col  = state.collapsedH.has(h);
  const clr  = HORIZON_COLORS[h];
  const items = filtered().filter(i=>i.horizon===h).sort((a,b)=>a.displayOrder-b.displayOrder);
  const body = col ? '' : `<div style="border:1px solid ${clr}44;border-top:none;border-radius:0 0 6px 6px;padding:12px;background:#fafcff">${items.length===0?'<p style="margin:0;font-size:.85rem;color:#9ca3af;font-style:italic;padding:8px 0">No items match the current filters.</p>':items.map(renderCard).join('')}</div>`;
  return `<section style="margin-bottom:24px"><button onclick="toggleHorizon('${esc(h)}')" style="width:100%;display:flex;align-items:center;gap:12px;padding:10px 16px;background:${clr};border:none;border-radius:${col?'6px':'6px 6px 0 0'};cursor:pointer;text-align:left;color:#fff;font-family:inherit"><span style="font-size:1rem;font-weight:700">${esc(HORIZON_LABELS[h]??h)}</span><span style="display:inline-flex;align-items:center;justify-content:center;min-width:24px;height:24px;padding:0 6px;border-radius:12px;background:rgba(255,255,255,.25);font-size:.78rem;font-weight:700">${items.length}</span><span style="flex:1;font-size:.82rem;opacity:.85;font-style:italic">${esc(HORIZON_DESCS[h]??'')}</span><span style="font-size:.8rem;opacity:.8">${col?'▶':'▼'}</span></button>${body}</section>`;
}

  const jiraProjects = [...new Set((state.data?.jiraTickets??[]).map(t=>t.project).filter(Boolean))].sort();
  const hasF = origin||siStatus||activityType||jiraProject;
  const sel = `padding:7px 10px;border-radius:6px;border:1px solid #cbd5e0;background:#fff;font-size:.85rem;color:#2d3748;cursor:pointer;min-width:160px;font-family:inherit`;
  return `<div style="display:flex;flex-direction:column;gap:12px;padding:14px 16px;background:#fff;border:1px solid #e2e8f0;border-radius:8px;margin-bottom:20px"><div style="display:flex;flex-wrap:wrap;gap:12px;align-items:center"><div style="display:flex;align-items:center;gap:6px"><label style="font-size:.8rem;font-weight:600;color:#718096;text-transform:uppercase;letter-spacing:.04em">Origin</label><select onchange="setFilter('origin',this.value)" style="${sel}"><option value="">All sources</option>${(state.data?.events??[]).map(ev=>`<option value="${esc(ev.shortCode)}"${origin===ev.shortCode?' selected':''}>${esc(ev.displayLabel)}</option>`).join('')}</select></div><div style="display:flex;align-items:center;gap:6px"><label style="font-size:.8rem;font-weight:600;color:#718096;text-transform:uppercase;letter-spacing:.04em">Status</label><select onchange="setFilter('siStatus',this.value)" style="${sel}"><option value="">All statuses</option>${['Active','Planned','Paused','Deferred'].map(st=>`<option value="${st}"${siStatus===st?' selected':''}>${st}</option>`).join('')}</select></div><div style="display:flex;align-items:center;gap:6px"><label style="font-size:.8rem;font-weight:600;color:#718096;text-transform:uppercase;letter-spacing:.04em">Activity</label><select onchange="setFilter('activityType',this.value)" style="${sel}"><option value="">All types</option>${Object.entries(ACTIVITY_LABELS).map(([v,l])=>`<option value="${v}"${activityType===v?' selected':''}>${esc(l)}</option>`).join('')}</select></div>${jiraProjects.length?`<div style="display:flex;align-items:center;gap:6px"><label style="font-size:.8rem;font-weight:600;color:#718096;text-transform:uppercase;letter-spacing:.04em">Jira</label><select onchange="setFilter('jiraProject',this.value)" style="${sel}"><option value="">All projects</option>${jiraProjects.map(p=>`<option value="${esc(p)}"${jiraProject===p?' selected':''}>${esc(p)}</option>`).join('')}</select></div>`:''  }${hasF?`<button onclick="resetFilters()" style="padding:7px 14px;border-radius:6px;border:1px solid #e2e8f0;background:#f7fafc;font-size:.82rem;color:#718096;cursor:pointer;font-weight:600">Clear Filters</button>`:''}</div></div>`;
}

/* ─── MEMBER PRIORITIES ──────────────────────────────────────────────────── */
function renderPriority(p) {
  const exp = state.expandedP.has(p.id);
  return `<div style="background:#fff;border:1px solid #e2e8f0;border-left:4px solid #4A90D9;border-radius:6px;margin-bottom:8px;overflow:hidden;box-shadow:0 1px 3px rgba(0,0,0,.05)"><button onclick="togglePriority('${esc(p.id)}')" style="width:100%;display:flex;align-items:center;gap:14px;padding:12px 16px;background:transparent;border:none;cursor:pointer;text-align:left;font-family:inherit"><span style="display:flex;align-items:center;justify-content:center;width:32px;height:32px;border-radius:50%;background:#4A90D9;color:#fff;font-size:.85rem;font-weight:700;flex-shrink:0">${p.rank}</span><div style="flex:1"><div style="font-size:.93rem;font-weight:600;color:#1a202c;margin-bottom:4px">${esc(p.topicTitle)}</div><div style="display:flex;gap:8px;align-items:center;flex-wrap:wrap"><span style="font-size:.78rem;color:#718096;background:#f7fafc;border:1px solid #e2e8f0;border-radius:4px;padding:1px 7px">${p.responseCount} responses (${p.responsePercentage}%)</span>${p.provenanceEvents.map(e=>chip({shortCode:e.shortCode,displayLabel:e.displayLabel})).join('')}</div></div><span style="font-size:.75rem;color:#a0aec0">${exp?'▼':'▶'}</span></button>${exp?`<div style="padding:4px 16px 14px 62px;border-top:1px solid #f0f4f8">${fieldRow('Current SI Activity',p.currentSIActivity)}${fieldRow('Progress Summary',p.progressSummary)}${fieldRow('Next Milestones',p.nextMilestones)}${fieldRow('Risk Factors',p.riskFactors)}</div>`:''}</div>`;
}
function renderPriorities() {
  const sorted = [...(state.data?.priorities??[])].sort((a,b)=>a.rank-b.rank);
  if (!sorted.length) return '';
  return `<section style="margin-top:32px"><div style="margin-bottom:16px"><h2 style="margin:0 0 4px;font-size:1.15rem;font-weight:700;color:#003865">Member Priorities</h2><p style="margin:0;font-size:.85rem;color:#718096">Top priorities identified through member surveys and engagement events (${sorted.length} topics)</p></div>${sorted.map(renderPriority).join('')}</section>`;
}

/* ─── GLOSSARY ───────────────────────────────────────────────────────────── */
function renderGlossary() {
  const btn = `<button onclick="toggleGlossary()" style="width:100%;display:flex;justify-content:space-between;align-items:center;padding:14px 20px;background:#f8fafc;border:none;${state.glossaryOpen?'border-bottom:1px solid #e2e8f0;':''}cursor:pointer;font-size:.95rem;font-weight:700;color:#003865;font-family:inherit"><span>Glossary &amp; Key</span><span>${state.glossaryOpen?'▲':'▼'}</span></button>`;
  const body = state.glossaryOpen ? `<div style="padding:20px;display:grid;gap:24px">
    <div><h3 style="margin:0 0 12px;font-size:.9rem;color:#4a5568;text-transform:uppercase;letter-spacing:.06em">Horizons</h3><div style="display:grid;gap:8px">${HORIZON_ORDER.map(h=>`<div style="display:flex;gap:12px;align-items:flex-start"><span style="display:inline-block;min-width:130px;padding:3px 10px;border-radius:4px;background:${HORIZON_COLORS[h]};color:#fff;font-size:.78rem;font-weight:700;text-align:center">${esc(HORIZON_LABELS[h])}</span><span style="font-size:.85rem;color:#4a5568;line-height:1.5">${esc(HORIZON_DESCS[h])}</span></div>`).join('')}</div></div>
    <div><h3 style="margin:0 0 12px;font-size:.9rem;color:#4a5568;text-transform:uppercase;letter-spacing:.06em">Activity Types</h3><div style="display:grid;gap:8px">${Object.entries(ACTIVITY_LABELS).map(([t,l])=>`<div style="display:flex;gap:12px;align-items:flex-start"><span style="display:inline-block;min-width:130px;padding:3px 10px;border-radius:4px;background:${ACTIVITY_COLORS[t]};color:#fff;font-size:.78rem;font-weight:700;text-align:center">${esc(l)}</span><span style="font-size:.85rem;color:#4a5568;line-height:1.5">${esc(ACTIVITY_DESCS[t])}</span></div>`).join('')}</div></div>
    <div><h3 style="margin:0 0 12px;font-size:.9rem;color:#4a5568;text-transform:uppercase;letter-spacing:.06em">SI Status</h3><div style="display:grid;gap:8px">${Object.entries(STATUS_DESCS).map(([s,d])=>`<div style="display:flex;gap:12px;align-items:flex-start"><span style="display:inline-block;min-width:80px;padding:3px 10px;border-radius:12px;background:${STATUS_BADGE[s]};color:#fff;font-size:.78rem;font-weight:700;text-align:center">${esc(s)}</span><span style="font-size:.85rem;color:#4a5568;line-height:1.5">${esc(d)}</span></div>`).join('')}</div></div>
    <div><h3 style="margin:0 0 12px;font-size:.9rem;color:#4a5568;text-transform:uppercase;letter-spacing:.06em">Provenance Chips</h3><p style="margin:0;font-size:.85rem;color:#4a5568;line-height:1.6">Blue provenance chips indicate the evidence source or stakeholder input that led to this roadmap item being included. Short codes (e.g. <strong>Seoul24</strong>) reference specific surveys, workshops, or forum sessions. The optional <sup>#n</sup> superscript links to a specific ranked gap from that event.</p></div>
  </div>` : '';
  return `<section style="margin-top:2rem;border:1px solid #e2e8f0;border-radius:8px;overflow:hidden;background:#fff">${btn}${body}</section>`;
}

/* ─── GANTT TIMELINE ─────────────────────────────────────────────────────── */
function renderGantt() {
  if (!state.data) return '';
  const items = [...state.data.items].sort((a,b)=>HORIZON_ORDER.indexOf(a.horizon)-HORIZON_ORDER.indexOf(b.horizon)||a.displayOrder-b.displayOrder);
  const grouped = {}; HORIZON_ORDER.forEach(h=>{grouped[h]=items.filter(i=>i.horizon===h);});
  const active = HORIZON_ORDER.filter(h=>grouped[h].length>0);
  let totalRows=0; const offsets={};
  active.forEach(h=>{offsets[h]=totalRows; totalRows+=1+grouped[h].length;});
  const W=G.LABEL+TIMELINE_PERIODS.length*G.COL, H=G.HDR+totalRows*G.ROW;
  let s=`<svg width="${W}" height="${H}" style="font-family:'Mulish',Arial,sans-serif"><rect width="${W}" height="${H}" fill="#fff"/>`;
  s+=`<rect x="0" y="0" width="${G.LABEL}" height="${G.HDR}" fill="#003865"/>`;
  s+=`<text x="12" y="${G.HDR/2+5}" font-size="12" font-weight="700" fill="#fff">Roadmap Item</text>`;
  TIMELINE_PERIODS.forEach((p,i)=>{const x=G.LABEL+i*G.COL; s+=`<rect x="${x}" y="0" width="${G.COL}" height="${G.HDR}" fill="${i%2===0?'#003865':'#004a82'}"/><text x="${x+G.COL/2}" y="${G.HDR/2+5}" font-size="11" font-weight="600" fill="#fff" text-anchor="middle">${esc(p)}</text>`;});
  for(let i=0;i<=TIMELINE_PERIODS.length;i++) s+=`<line x1="${G.LABEL+i*G.COL}" y1="0" x2="${G.LABEL+i*G.COL}" y2="${H}" stroke="#e2e8f0" stroke-width="1"/>`;
  active.forEach(h=>{
    const ro=offsets[h]; const hY=G.HDR+ro*G.ROW; const hItems=grouped[h];
    s+=`<rect x="0" y="${hY}" width="${W}" height="${G.HORIZ}" fill="${HORIZON_COLORS[h]}"/>`;
    s+=`<text x="12" y="${hY+G.HORIZ/2+5}" font-size="11" font-weight="700" fill="#fff">${esc(HORIZON_LABELS[h])} (${hItems.length})</text>`;
    hItems.forEach((item,idx)=>{
      const rY=G.HDR+(ro+1+idx)*G.ROW;
      s+=`<rect x="0" y="${rY}" width="${W}" height="${G.ROW}" fill="${idx%2===0?'#fff':'#f8fafc'}"/>`;
      s+=`<rect x="0" y="${rY}" width="4" height="${G.ROW}" fill="${ACTIVITY_COLORS[item.activityType]??'#718096'}"/>`;
      const title=item.title.length>36?item.title.slice(0,34)+'…':item.title;
      s+=`<text x="12" y="${rY+G.ROW/2+4}" font-size="11" fill="#2d3748">${esc(title)}</text>`;
      s+=`<line x1="0" y1="${rY+G.ROW}" x2="${W}" y2="${rY+G.ROW}" stroke="#edf2f7" stroke-width="1"/>`;
      item.deliveryPeriods.forEach(dp=>{
        const ci=TIMELINE_PERIODS.indexOf(dp.periodLabel); if(ci<0) return;
        const bx=G.LABEL+ci*G.COL+2, by=rY+(G.ROW-20)/2, bw=G.COL-4;
        const fill=BAR_FILL[dp.barStyle]??'#4A90D9', stroke=BAR_STROKE[dp.barStyle]??'#2171b5';
        const dash=dp.barStyle==='Planned'?'stroke-dasharray="5,3"':'';
        s+=`<rect x="${bx}" y="${by}" width="${bw}" height="20" rx="4" ry="4" fill="${fill}" stroke="${stroke}" stroke-width="1.5" ${dash}/>`;
      });
    });
  });
  s+='</svg>';
  return s;
}

/* ─── ITEMS AREA (for partial re-render) ─────────────────────────────────── */
function renderItemsArea() {
  return HORIZON_ORDER.map(renderHorizon).join('') + renderPriorities() + renderGlossary();
}

/* ─── DASHBOARD PAGE ─────────────────────────────────────────────────────── */
function renderDashboard() {
  if (state.loading) return `<div style="width:100%;background:#f5f7fa;display:flex;align-items:center;justify-content:center"><div style="text-align:center;color:#718096;font-size:.95rem">Loading roadmap data…</div></div>`;
  if (state.error) return `<div style="padding:48px;text-align:center;color:#c53030;font-size:.9rem">${esc(state.error)}</div>`;
  const f=filtered(); const counts={}; HORIZON_ORDER.forEach(h=>{counts[h]=f.filter(i=>i.horizon===h).length;});
  const srcTag = state.fromSheets
    ? `<span style="font-size:.72rem;color:#00A9E0;padding:2px 8px;border-radius:4px;background:rgba(255,255,255,.15)">● Live — Google Sheets</span>`
    : `<span style="font-size:.72rem;color:#FFC600;padding:2px 8px;border-radius:4px;background:rgba(255,255,255,.1)">⚠ Sample data — set GOOGLE_SHEETS_ID</span>`;
  return `<div style="width:100%;background:#f5f7fa">
    <header style="background:linear-gradient(135deg,#003865 0%,#002040 100%);color:#fff;box-shadow:0 2px 8px rgba(0,0,0,.2)">
      <div style="max-width:100%;padding:20px 24px">
        <div style="display:flex;justify-content:space-between;align-items:flex-start;flex-wrap:wrap;gap:12px">
          <div>
            <div style="font-size:.75rem;color:#00A9E0;font-weight:600;letter-spacing:.1em;text-transform:uppercase;margin-bottom:4px">SNOMED International</div>
            <h1 style="margin:0 0 6px;font-size:1.5rem;font-weight:800;line-height:1.2">Content Development Roadmap</h1>
            <p style="margin:0 0 8px;font-size:.87rem;color:rgba(255,255,255,.8);line-height:1.5">Tracking SNOMED CT content development activities across all planning horizons</p>
            ${srcTag}
          </div>
          <button onclick="setView('timeline')" style="padding:7px 16px;border-radius:6px;border:1px solid rgba(255,255,255,.3);color:#fff;font-size:.85rem;font-weight:600;background:rgba(255,255,255,.1);cursor:pointer;align-self:center">Timeline View →</button>
        </div>
        <div style="display:flex;gap:20px;margin-top:20px;flex-wrap:wrap">
          ${HORIZON_ORDER.map(h=>`<div style="text-align:center"><div style="font-size:1.3rem;font-weight:800;color:#fff">${counts[h]??0}</div><div style="font-size:.72rem;color:#00A9E0;text-transform:uppercase;letter-spacing:.06em">${esc(HORIZON_LABELS[h]??h)}</div></div>`).join('')}
          <div style="text-align:center;border-left:1px solid rgba(255,255,255,.2);padding-left:20px"><div style="font-size:1.3rem;font-weight:800;color:#fff">${f.length}</div><div style="font-size:.72rem;color:#00A9E0;text-transform:uppercase;letter-spacing:.06em">Total</div></div>
        </div>
      </div>
    </header>
    <main style="max-width:100%;padding:24px">
      <div id="filter-bar">${renderFilterBar()}</div>
      <div id="items-area">${renderItemsArea()}</div>
    </main>
    <footer style="margin-top:48px;padding:20px 24px;background:#003865;color:#00A9E0;font-size:.8rem;text-align:center">
      &copy; ${new Date().getFullYear()} IHTSDO &middot; Content Development Roadmap
    </footer>
  </div>`;
}

/* ─── TIMELINE PAGE ──────────────────────────────────────────────────────── */
function renderTimeline() {
  return `<div style="width:100%;background:#f5f7fa">
    <header style="background:linear-gradient(135deg,#003865 0%,#002040 100%);color:#fff;box-shadow:0 2px 8px rgba(0,0,0,.2)">
      <div style="max-width:100%;padding:16px 24px">
        <div style="display:flex;align-items:center;gap:16px;flex-wrap:wrap">
          <button onclick="setView('dashboard')" style="color:#00A9E0;background:none;border:none;font-size:.85rem;cursor:pointer;font-family:inherit">← Dashboard</button>
          <div style="width:1px;height:20px;background:rgba(255,255,255,.2)"></div>
          <div>
            <div style="font-size:.72rem;color:#00A9E0;letter-spacing:.1em;text-transform:uppercase">SNOMED International</div>
            <h1 style="margin:0;font-size:1.25rem;font-weight:800">Timeline View</h1>
          </div>
        </div>
      </div>
    </header>
    <main style="max-width:100%;padding:24px">
      <div style="background:#fff;border:1px solid #e2e8f0;border-radius:8px;padding:16px;margin-bottom:16px">
        <div style="display:flex;gap:20px;flex-wrap:wrap;font-size:.82rem">
          ${[['#28a745','Active'],['#ffc107','Planned (dashed)'],['#adb5bd','Assessment'],['#4A90D9','Ongoing']].map(([c,l])=>`<div style="display:flex;align-items:center;gap:6px"><div style="width:24px;height:12px;background:${c};border-radius:3px"></div><span style="color:#4a5568">${esc(l)}</span></div>`).join('')}
        </div>
      </div>
      <div style="background:#fff;border:1px solid #e2e8f0;border-radius:8px;overflow:hidden;box-shadow:0 1px 4px rgba(0,0,0,.06)">
        <div style="overflow-x:auto">${renderGantt()}</div>
      </div>
    </main>
    <footer style="margin-top:48px;padding:16px 24px;background:#003865;color:#00A9E0;font-size:.8rem;text-align:center">
      &copy; ${new Date().getFullYear()} IHTSDO &middot; Content Development Roadmap
    </footer>
  </div>`;
}

/* ─── RENDER ENTRY POINTS ────────────────────────────────────────────────── */
function render() {
  document.getElementById('app').innerHTML = state.view==='timeline' ? renderTimeline() : renderDashboard();
}
function refreshItems() {
  const el=document.getElementById('items-area');
  if (!el) { render(); return; }
  const y=window.scrollY;
  el.innerHTML=renderItemsArea();
  window.scrollTo(0,y);
}
function refreshFilterAndItems() {
  const fb=document.getElementById('filter-bar');
  const ia=document.getElementById('items-area');
  if (!fb||!ia) { render(); return; }
  const y=window.scrollY;
  fb.innerHTML=renderFilterBar();
  ia.innerHTML=renderItemsArea();
  window.scrollTo(0,y);
}

/* ─── EVENT HANDLERS (called from inline onclick) ────────────────────────── */
function toggleItem(id)     { state.expanded.has(id)?state.expanded.delete(id):state.expanded.add(id); refreshItems(); }
function toggleHorizon(h)   { state.collapsedH.has(h)?state.collapsedH.delete(h):state.collapsedH.add(h); refreshItems(); }
function togglePriority(id) { state.expandedP.has(id)?state.expandedP.delete(id):state.expandedP.add(id); refreshItems(); }
function toggleGlossary()   { state.glossaryOpen=!state.glossaryOpen; refreshItems(); }
function setFilter(k,v)     { state.filters[k]=v; refreshFilterAndItems(); }
function resetFilters()     { state.filters={origin:'',siStatus:'',activityType:'',jiraProject:''}; render(); }
function setView(v)         { state.view=v; render(); }

/* ─── AUTO-HEIGHT FOR GOOGLE SITES IFRAME ────────────────────────────────── */
function reportHeight() {
  if (window.parent === window) return;
  const h = document.documentElement.scrollHeight;
  // Google Sites / AMP iframe resize protocol
  window.parent.postMessage(JSON.stringify({sentinel:'amp',type:'embed-size',height:h}), '*');
  window.parent.postMessage({type:'setHeight',height:h}, '*');
}
if (window.parent !== window) {
  new MutationObserver(reportHeight).observe(document.body, {childList:true,subtree:true,attributes:true});
  window.addEventListener('load', reportHeight);
}

/* ─── START ──────────────────────────────────────────────────────────────── */
init();
</script>
</body>
