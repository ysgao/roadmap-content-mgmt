name: Fetch Jira Ticket Data

on:
  schedule:
    - cron: '*/30 * * * *'   # every 30 minutes
  workflow_dispatch:           # manual trigger
  push:
    branches: [main]
    paths:
      - 'scripts/fetch-jira-data.mjs'

permissions:
  contents: write

jobs:
  fetch:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 20

      - name: Fetch Jira ticket data
        env:
          JIRA_BASE_URL: ${{ secrets.JIRA_BASE_URL }}
          JIRA_EMAIL: ${{ secrets.JIRA_EMAIL }}
          JIRA_API_TOKEN: ${{ secrets.JIRA_API_TOKEN }}
          GOOGLE_SHEETS_ID: ${{ vars.VITE_GOOGLE_SHEETS_ID }}
        run: node scripts/fetch-jira-data.mjs

      - name: Commit updated data
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add frontend/public/data/jira-tickets.json
          git diff --staged --quiet || git commit -m "chore: refresh Jira ticket data [skip ci]"
          git pull --rebase origin main
          git push
